name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android & Generate Assets
        run: |
          npx cap sync android
          npx @capacitor/assets generate --android

      - name: Restore and Fix Gradle Wrapper
        run: |
          cd android
          # Ensure correct wrapper jar directly from official Gradle repo to bypass any Git corruption
          mkdir -p gradle/wrapper
          curl -sLo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          # Safeguard against CRLF carriage returns in gradlew
          sed -i -e 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Hisab Khata APK
        uses: actions/upload-artifact@v4
        with:
          name: Hisab-Khata-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
